detector:
  hf_name: PekingU/rtdetr_r50vd
  local_path: pretrained/rtdetr_r50vd
  cache_dir:
  device: auto

data:
  dataset_name: imagenet_vid
  train_source_path:
  val_source_path:
  recursive: true
  index_cache_dir: .cache/stage1_data
  subset_seed: 42
  source_fraction: 0.2
  sample_fraction: 0.2
  gop_size: 4
  frame_height: 640
  frame_width: 640
  frame_stride: 1
  gop_stride: 2
  max_frames_per_source:
  max_sources:
  max_samples:
  train_val_split: 0.1

mdvsc:
  feature_channels: [256, 256, 256]
  latent_dims: [48, 64, 96]
  common_keep_ratios: [0.5, 0.625, 0.75]
  individual_keep_ratios: [0.125, 0.1875, 0.25]
  block_sizes: [8, 4, 2]
  apply_masks: true
  channel_mode: identity
  snr_db: 20.0

optimization:
  batch_size: 1
  num_workers: 4
  epochs: 10
  lr: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 1
  warmup_start_factor: 0.2
  min_lr_ratio: 0.1
  grad_clip_norm: 1.0
  log_every: 10
  save_every_epochs: 1
  max_steps_per_epoch:
  seed: 42

loss:
  feature_loss_weight: 1.0
  recon_l1_weight: 1.0
  recon_mse_weight: 0.25
  detection_logit_weight: 0.05
  detection_box_weight: 0.05
  level_loss_weights: [1.0, 1.0, 1.0]

output:
  output_dir: outputs/mdvsc_stage1_imagenet_vid_subset
  save_visualizations: true
  visualization_every_epochs: 1
  visualization_num_frames: 4